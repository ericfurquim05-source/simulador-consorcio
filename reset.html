<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Atualizando simulador</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1118;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px;text-align:center}
    .box{max-width:520px;background:#131c26;border:1px solid #2a3949;border-radius:18px;padding:28px}
    h1{margin:0 0 12px;font-size:24px}p{color:#c5d0da;line-height:1.5}.ok{color:#5ee19b;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <h1>Atualizando o simulador…</h1>
    <p id="status">Limpando a versão antiga salva no navegador.</p>
  </div>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(name => caches.delete(name)));
          try { sessionStorage.clear(); } catch (_) {}
        }
        document.getElementById('status').innerHTML = '<span class="ok">Cache limpo.</span> Abrindo a versão 2.2.14…';
      } catch (e) {
        document.getElementById('status').textContent = 'Abrindo a versão atualizada…';
      }
      setTimeout(() => location.replace('./index.html?v=2213&t=' + Date.now()), 800);
    })();
  </script>
</body>
</html>
